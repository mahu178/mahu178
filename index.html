<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>mahu178's personal whatever</title>
        <meta name="viewport" content="width=device-width" />
        <meta name="description" content="a portfolio, a blog, a progress tracker, and a very breezy vent" />
        <link rel="stylesheet" href="styles.css" />
        <link rel="icon" type="image/png" href="/images/favicon.png" />
        <link rel="alternate" href="vi.html" hreflang="vi-VN" />
        <meta name="color-scheme" content="light dark">
    </head>

    <body class="grid">
        <div>
            <header>index.html</header>

            <main>
                <h1><a href="?=about" data-page="#">mahu178</a>'s personal whatever</h1> is officially online(?). <a href="?=site" data-page="#">this site</a> is a whole mess that i am almost bothered to clean. for quick access, here are <a href="?=portfolio" data-page="#">my portfolio or best works</a>, <a href="?=projects" data-page="#">my projects</a>, and <a href="?=blog" data-page="#">my blog</a>.

                <footer>
                    site last updated: 16/05/2026</br>latest update: <a href="?=about" data-page="#">about.html</a>
                </footer>
            </main>
        </div>
        <div id="embed" class="hidden-para"></div>
        
        <script>
            const embed = document.getElementById('embed');
            const pageLinks = document.querySelectorAll('a[data-page]');

            async function loadPage(page, pushState = true) {
                if (pushState) {
                    history.pushState({ page }, '', '?=' + page);
                }

                if (page === 'home') {
                    embed.innerHTML = '';
                    embed.classList.add('hidden-para');
                    return;
                }

                try {
                    const response = await fetch(page + '.html');
                    if (!response.ok) throw new Error('Network response was not ok');
                    const html = await response.text();
                    embed.innerHTML = html;
                    embed.classList.remove('hidden-para');
                } catch (error) {
                    embed.innerHTML = '<header><div>404.bruh</div><div><a href="index.html">Close all</a></div></header><main><h1>404</h1>nothing here for now…</main>';
                    embed.classList.remove('hidden-para');
                }
            }

            document.addEventListener('click', event => {
                const link = event.target.closest('a[data-page]');
                if (!link) return;
                event.preventDefault();
                loadPage(link.dataset.page);
            });

            window.addEventListener('popstate', event => {
                const statePage = event.state?.page || 'home';
                loadPage(statePage, false);
            });

            const params = new URLSearchParams(location.search);
            const initialPage = params.get('page') || 'home';
            if (initialPage !== 'home') {
                loadPage(initialPage, false);
            }
        </script>
    </body>
</html>
